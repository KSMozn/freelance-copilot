name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: upwork
          POSTGRES_PASSWORD: upwork
          POSTGRES_DB: upwork_intel_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U upwork -d upwork_intel_test"
          --health-interval=5s --health-timeout=5s --health-retries=10
    env:
      POSTGRES_USER: upwork
      POSTGRES_PASSWORD: upwork
      POSTGRES_DB: upwork_intel_test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      SECRET_KEY: ci-secret-key-please-change
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }
      - working-directory: backend
        run: |
          pip install -e ".[dev]"
      - working-directory: backend
        run: ruff check .
      # Strict mypy with the explicit ratchet baseline in pyproject.toml —
      # exits 0 today; the baseline may only shrink.
      - working-directory: backend
        run: mypy app
      - working-directory: backend
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - working-directory: frontend
        run: npm ci || npm install
      # Lint enforces the feature-boundary zones (import-x/no-restricted-paths)
      # — without this step the architecture rules are only checked locally.
      - working-directory: frontend
        run: npm run lint
      - working-directory: frontend
        run: npm run typecheck
      - working-directory: frontend
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.example .env
      - name: Start the stack
        run: docker compose up -d --build
      - name: Wait for backend health
        run: timeout 180 bash -c 'until curl -sf http://localhost:8000/api/v1/health; do sleep 3; done'
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - working-directory: frontend
        run: npm ci || npm install
      - working-directory: frontend
        run: npx playwright install --with-deps chromium
      # global-setup creates the E2E admin via docker compose exec; OTP codes
      # are read from the mock mailbox at backend/var/dev-emails.jsonl.
      - working-directory: frontend
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7
