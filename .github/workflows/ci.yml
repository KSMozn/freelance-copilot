name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: upwork
          POSTGRES_PASSWORD: upwork
          POSTGRES_DB: upwork_intel_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U upwork -d upwork_intel_test"
          --health-interval=5s --health-timeout=5s --health-retries=10
    env:
      POSTGRES_USER: upwork
      POSTGRES_PASSWORD: upwork
      POSTGRES_DB: upwork_intel_test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      SECRET_KEY: ci-secret-key-please-change
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }
      - working-directory: backend
        run: |
          pip install -e ".[dev]"
      - working-directory: backend
        run: ruff check .
      - working-directory: backend
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - working-directory: frontend
        run: npm ci || npm install
      # Lint enforces the feature-boundary zones (import-x/no-restricted-paths)
      # — without this step the architecture rules are only checked locally.
      - working-directory: frontend
        run: npm run lint
      - working-directory: frontend
        run: npm run typecheck
      - working-directory: frontend
        run: npm run build
