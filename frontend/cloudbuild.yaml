steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - Dockerfile.prod
      - --build-arg
      - VITE_API_BASE_URL=https://api.careero.app/api/v1
      - -t
      - europe-west1-docker.pkg.dev/freelance-copilot-841590/freelance-copilot/frontend:latest
      - .
images:
  - europe-west1-docker.pkg.dev/freelance-copilot-841590/freelance-copilot/frontend:latest
options:
  machineType: E2_HIGHCPU_8
