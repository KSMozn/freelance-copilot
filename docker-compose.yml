services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-upwork}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-upwork}
      POSTGRES_DB: ${POSTGRES_DB:-upwork_intel}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-upwork} -d ${POSTGRES_DB:-upwork_intel}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    # Dev-only: the image runs as non-root appuser (Cloud Run hardening), but
    # Windows/macOS bind mounts surface as root-owned inside the container —
    # appuser then cannot write var/ (dev-emails.jsonl, uploads). Compose is
    # dev-only, so run as root here; production does not use compose.
    user: root
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-upwork}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-upwork}
      POSTGRES_DB: ${POSTGRES_DB:-upwork_intel}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-this-is-a-dev-only-key}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-14}
      IMPERSONATION_TOKEN_EXPIRE_MINUTES: ${IMPERSONATION_TOKEN_EXPIRE_MINUTES:-30}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-6}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-mock}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_API_BASE_URL: ${GITHUB_API_BASE_URL:-https://api.github.com}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-mock}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-no-reply@example.com}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Careero}
      APP_NAME: ${APP_NAME:-Careero}
      OTP_EXPIRES_MINUTES: ${OTP_EXPIRES_MINUTES:-10}
      OTP_MAX_ATTEMPTS: ${OTP_MAX_ATTEMPTS:-5}
      OTP_RATE_LIMIT_PER_15MIN: ${OTP_RATE_LIMIT_PER_15MIN:-3}
      PASSWORD_RESET_EXPIRES_MINUTES: ${PASSWORD_RESET_EXPIRES_MINUTES:-30}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5173}
      ADMIN_BASE_URL: ${ADMIN_BASE_URL:-http://localhost:5173}
      BLOB_STORE: ${BLOB_STORE:-local}
      UPLOADS_DIR: ${UPLOADS_DIR:-var/uploads}
      GCS_UPLOADS_BUCKET: ${GCS_UPLOADS_BUCKET:-}
      REPORT_TASK_SECRET: ${REPORT_TASK_SECRET:-}
    healthcheck:
      # start_period covers `alembic upgrade head` before uvicorn binds.
      # 127.0.0.1, not localhost: uvicorn binds IPv4 0.0.0.0 and localhost
      # can resolve to ::1 inside the container.
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000/api/v1/health"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 30s
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
      # Windows/macOS bind mounts don't deliver file events into the Linux
      # container — without polling, in-container Vite serves stale modules
      # and HMR never fires on host-side edits.
      CHOKIDAR_USEPOLLING: "true"
    healthcheck:
      # busybox wget (node:alpine); 127.0.0.1 because busybox resolves
      # localhost to ::1 while Vite binds IPv4 0.0.0.0 (refused on ::1).
      # start_period covers Vite's first boot.
      test: ["CMD", "wget", "-qO", "/dev/null", "http://127.0.0.1:5173/"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 20s
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  db_data:
