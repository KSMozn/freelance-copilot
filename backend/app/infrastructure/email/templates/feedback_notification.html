<!doctype html>
<html>
<body style="font-family: -apple-system, Helvetica, Arial, sans-serif; color:#111827; max-width:560px; margin:0 auto; padding:24px;">
  <h2 style="margin:0 0 8px 0; font-size:18px;">New feedback in {app_name}</h2>
  <p style="color:#6b7280; margin:0 0 16px 0; font-size:13px;">Submitted {created_at} · from <strong>{submitter_email}</strong></p>
  <div style="border-left:3px solid #2563eb; padding:8px 12px; background:#f9fafb; white-space:pre-wrap; font-size:14px; line-height:1.5;">{message}</div>
  <p style="margin-top:20px; font-size:13px;">
    <a href="{admin_url}" style="color:#2563eb;">Open the admin panel</a>
  </p>
</body>
</html>
