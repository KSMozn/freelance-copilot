<!DOCTYPE html>
<html>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 480px; margin: 0 auto; padding: 32px 24px; color: #1a1a1a;">
  <h2 style="margin: 0 0 16px; font-weight: 600;">Your {app_name} sign-in code</h2>
  <p style="margin: 0 0 24px; color: #4a5568;">Enter this code to finish signing in:</p>
  <div style="font-size: 32px; font-weight: 700; letter-spacing: 8px; padding: 16px 24px; background: #f7fafc; border: 1px solid #e2e8f0; border-radius: 8px; text-align: center; font-family: ui-monospace, SFMono-Regular, monospace;">{code}</div>
  <p style="margin: 24px 0 0; font-size: 14px; color: #718096;">This code expires in {expires_in_minutes} minutes. If you didn't request it, you can safely ignore this email.</p>
  <p style="margin: 24px 0 0; font-size: 14px; color: #a0aec0;">— {app_name}</p>
</body>
</html>
